name: Release Python Package

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_existing_version:
        description: Build and publish the current version to PyPI without creating a new release
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
      - name: Check out the code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run tests
        run: python -m unittest discover -v

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.release-status.outputs.released }}

    steps:
      - name: Check out the code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install release tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run semantic-release
        if: github.event_name != 'workflow_dispatch' || inputs.publish_existing_version != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release version

      - name: Build existing distribution
        if: github.event_name == 'workflow_dispatch' && inputs.publish_existing_version == true
        run: python -m build

      - name: Detect released distribution
        id: release-status
        run: |
          if [ -d dist ] && [ "$(find dist -type f | wc -l)" -gt 0 ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload distribution artifacts
        if: steps.release-status.outputs.released == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: distribution-artifacts
          path: dist
          if-no-files-found: error

  publish-to-pypi:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v6
        with:
          name: distribution-artifacts
          path: dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
          packages-dir: dist
