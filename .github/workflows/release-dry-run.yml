name: Semantic Release Dry Run

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install release tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Validate semantic-release configuration (no publish)
        run: semantic-release -v --noop version --print-last-released-tag
